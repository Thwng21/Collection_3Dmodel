<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Thỏ Tim - Trái tim đập toàn màn hình ❤️🐰</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: radial-gradient(circle, #0f172a, #020617);
  color: white;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
  height: 100vh;
}
h1 {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  margin: 0;
  color: #ff3366;
  z-index: 20;
  text-shadow: 0 0 20px #ff3366, 0 0 5px white;
  font-size: 22px;
  white-space: nowrap;
  background: rgba(0,0,0,0.6);
  padding: 8px 20px;
  border-radius: 50px;
  backdrop-filter: blur(5px);
  pointer-events: none;
}
video, canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  transform: scaleX(-1);
  object-fit: cover;
}
video { z-index: 1; }
canvas { z-index: 2; }
#panel {
  position: absolute;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 12px;
  z-index: 20;
  flex-wrap: wrap;
  pointer-events: none;
}
.box {
  display: inline-block;
  padding: 10px 20px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border: 1px solid #ff6b9d;
  border-radius: 30px;
  font-size: 16px;
  font-weight: bold;
  min-width: 180px;
  color: #fff;
  text-shadow: 0 0 5px #ff3366;
}
.heart-hint {
  position: absolute;
  top: 80px;
  right: 20px;
  background: rgba(255,51,102,0.7);
  padding: 8px 15px;
  border-radius: 30px;
  font-size: 14px;
  z-index: 20;
  pointer-events: none;
  backdrop-filter: blur(4px);
}
</style>
</head>
<body>
<h1>🐰 THỎ TIM ❤️ - CHẠM HAI NGÓN TRỎ TẠO TIM KHỔNG LỒ</h1>
<div class="heart-hint">💡 Cử chỉ: 👍 Ngón cái + 👆 Ngón trỏ (cả 2 tay) → chạm đầu ngón trỏ vào nhau</div>
<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="panel">
  <div id="leftHand" class="box">👈 Tay trái: ...</div>
  <div id="rightHand" class="box">👉 Tay phải: ...</div>
  <div id="faceBox" class="box">🐇 Khuôn mặt: ...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// ================== KHỞI TẠO ==================
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const leftHandText = document.getElementById("leftHand");
const rightHandText = document.getElementById("rightHand");
const faceBox = document.getElementById("faceBox");

canvas.width = 1280;
canvas.height = 720;

const fingerNames = ["Cái", "Trỏ", "Giữa", "Áp út", "Út"];

// Hiệu ứng trái tim toàn màn hình
let heartEffect = {
  active: false,
  scale: 0,
  opacity: 1,
  x: canvas.width / 2,
  y: canvas.height / 2
};

// ================== VẼ TAI THỎ ==================
function drawRabbitEar(ctx, x, y, isRight = false) {
  ctx.save();
  ctx.translate(x, y);
  if (isRight) ctx.scale(-1, 1);
  
  // Tai ngoài
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(-20, -50, -15, -75);
  ctx.quadraticCurveTo(-5, -85, 0, -80);
  ctx.quadraticCurveTo(5, -85, 15, -75);
  ctx.quadraticCurveTo(20, -50, 0, 0);
  ctx.fillStyle = "#FFB7C5";
  ctx.fill();
  ctx.strokeStyle = "#FF69B4";
  ctx.lineWidth = 2;
  ctx.stroke();
  
  // Tai trong
  ctx.beginPath();
  ctx.moveTo(0, -10);
  ctx.quadraticCurveTo(-10, -45, -8, -65);
  ctx.quadraticCurveTo(-2, -72, 0, -70);
  ctx.quadraticCurveTo(2, -72, 8, -65);
  ctx.quadraticCurveTo(10, -45, 0, -10);
  ctx.fillStyle = "#FF9EB5";
  ctx.fill();
  
  ctx.restore();
}

// ================== KIỂM TRA CỬ CHỈ HÌNH TIM ==================
function isHeartGesture(leftOpen, rightOpen, leftLm, rightLm) {
  if (!leftLm || !rightLm) return false;
  
  // Cả hai tay phải có ngón cái VÀ ngón trỏ
  const leftHas = leftOpen.includes("Cái") && leftOpen.includes("Trỏ");
  const rightHas = rightOpen.includes("Cái") && rightOpen.includes("Trỏ");
  
  if (!leftHas || !rightHas) return false;
  
  // Khoảng cách giữa hai đầu ngón trỏ (landmark 8)
  const leftTip = leftLm[8];
  const rightTip = rightLm[8];
  const dist = Math.hypot(leftTip.x - rightTip.x, leftTip.y - rightTip.y);
  
  // Chạm nhau hoặc rất gần
  return dist < 0.09;
}

// Kích hoạt hiệu ứng trái tim TO DẦN ra toàn màn hình
let lastHeartTime = 0;
function triggerHeartExplosion() {
  const now = Date.now();
  if (now - lastHeartTime < 900) return; // chống spam, mỗi lần cách nhau 0.9s
  lastHeartTime = now;
  
  heartEffect.active = true;
  heartEffect.scale = 0.05;      // bắt đầu từ rất nhỏ
  heartEffect.opacity = 1;       // độ đậm tối đa
  heartEffect.x = canvas.width / 2;
  heartEffect.y = canvas.height / 2;
}

// ================== MEDIA PIPE ==================
const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

const faceMesh = new FaceMesh({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

let faceLandmarks = null;

const camera = new Camera(video, {
  width: 1280,
  height: 720,
  onFrame: async () => {
    await hands.send({ image: video });
    await faceMesh.send({ image: video });
  }
});

setTimeout(() => camera.start(), 600);

faceMesh.onResults((results) => {
  faceLandmarks = (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0)
    ? results.multiFaceLandmarks[0]
    : null;
});

// ================== HÀM ĐẾM NGÓN TAY ==================
function getOpenFingers(landmarks, isLeft) {
  let openFingers = [];

  // Ngón cái
  const thumbTip = landmarks[4];
  const thumbMCP = landmarks[2];
  const thumbIP = landmarks[3];

  let thumbOpen = false;
  if (isLeft) {
    thumbOpen = thumbTip.x < Math.min(thumbMCP.x, thumbIP.x) - 0.02 || 
                (thumbTip.y < thumbMCP.y - 0.05);
  } else {
    thumbOpen = thumbTip.x > Math.max(thumbMCP.x, thumbIP.x) + 0.02 ||
                (thumbTip.y < thumbMCP.y - 0.05);
  }
  if (thumbOpen) openFingers.push("Cái");

  const tipIndices = [8, 12, 16, 20];
  const pipIndices = [6, 10, 14, 18];

  for (let i = 0; i < 4; i++) {
    const tip = landmarks[tipIndices[i]];
    const pip = landmarks[pipIndices[i]];
    const mcp = landmarks[pipIndices[i] - 2];

    if (tip.y < pip.y - 0.04 || (tip.y < mcp.y - 0.08)) {
      openFingers.push(fingerNames[i + 1]);
    }
  }
  return openFingers;
}

function isLeftHand(landmarks) {
  return landmarks[4].x > landmarks[5].x;
}

// ================== XỬ LÝ TAY ==================
let leftLm = null, rightLm = null;
let leftOpen = [], rightOpen = [];

hands.onResults((results) => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  leftLm = null;
  rightLm = null;
  leftOpen = [];
  rightOpen = [];

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    for (let i = 0; i < results.multiHandLandmarks.length; i++) {
      const lm = results.multiHandLandmarks[i];
      const isLeft = isLeftHand(lm);
      const openList = getOpenFingers(lm, isLeft);

      if (isLeft) {
        leftLm = lm;
        leftOpen = openList;
      } else {
        rightLm = lm;
        rightOpen = openList;
      }

      // Vẽ khung xương tay
      drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: "#00FFAA", lineWidth: 2.5 });
      drawLandmarks(ctx, lm, { color: "#FF0066", radius: 4 });
      
      // Tô vàng đầu ngón trỏ và ngón cái để dễ thấy cử chỉ tim
      if (lm[4]) {
        ctx.beginPath();
        ctx.arc(lm[4].x * canvas.width, lm[4].y * canvas.height, 8, 0, 2 * Math.PI);
        ctx.fillStyle = "#FFD700";
        ctx.fill();
        ctx.fillStyle = "black";
        ctx.font = "bold 14px Arial";
        ctx.shadowBlur = 0;
        ctx.fillText("👍", lm[4].x * canvas.width - 10, lm[4].y * canvas.height - 8);
      }
      if (lm[8]) {
        ctx.beginPath();
        ctx.arc(lm[8].x * canvas.width, lm[8].y * canvas.height, 8, 0, 2 * Math.PI);
        ctx.fillStyle = "#FFD700";
        ctx.fill();
        ctx.fillStyle = "black";
        ctx.fillText("👆", lm[8].x * canvas.width - 8, lm[8].y * canvas.height - 10);
      }
    }
  }

  leftHandText.innerText = `👈 Tay trái: ${leftOpen.length > 0 ? leftOpen.join(" + ") : "✋ Không thấy"}`;
  rightHandText.innerText = `👉 Tay phải: ${rightOpen.length > 0 ? rightOpen.join(" + ") : "✋ Không thấy"}`;

  // KIỂM TRA CỬ CHỈ TIM - NẾU ĐÚNG THÌ BẬT HIỆU ỨNG
  if (isHeartGesture(leftOpen, rightOpen, leftLm, rightLm)) {
    triggerHeartExplosion();
    
    // Hiệu ứng nháy đỏ trên panel
    leftHandText.style.borderColor = "#ff0000";
    rightHandText.style.borderColor = "#ff0000";
    leftHandText.style.backgroundColor = "rgba(255,0,0,0.3)";
    rightHandText.style.backgroundColor = "rgba(255,0,0,0.3)";
    setTimeout(() => {
      leftHandText.style.borderColor = "#ff6b9d";
      rightHandText.style.borderColor = "#ff6b9d";
      leftHandText.style.backgroundColor = "rgba(0,0,0,0.6)";
      rightHandText.style.backgroundColor = "rgba(0,0,0,0.6)";
    }, 300);
  }
});

// ================== VẼ FILTER THỎ + HIỆU ỨNG TIM TO DẦN ==================
function drawRabbitFilterAndEffects() {
  // 1. Vẽ tai thỏ và mắt thỏ
  if (faceLandmarks) {
    const leftForehead = faceLandmarks[234];
    const rightForehead = faceLandmarks[454];
    const leftEye = faceLandmarks[133];
    const rightEye = faceLandmarks[362];
    const nose = faceLandmarks[1];
    
    if (leftForehead && rightForehead) {
      drawRabbitEar(ctx, leftForehead.x * canvas.width, leftForehead.y * canvas.height - 25, false);
      drawRabbitEar(ctx, rightForehead.x * canvas.width, rightForehead.y * canvas.height - 25, true);
    }
    
    if (leftEye && rightEye) {
      // Mắt trái
      ctx.beginPath();
      ctx.arc(leftEye.x * canvas.width, leftEye.y * canvas.height - 3, 7, 0, 2 * Math.PI);
      ctx.fillStyle = "#FF6B9D";
      ctx.fill();
      ctx.beginPath();
      ctx.arc(leftEye.x * canvas.width - 2, leftEye.y * canvas.height - 5, 2.5, 0, 2 * Math.PI);
      ctx.fillStyle = "white";
      ctx.fill();
      
      // Mắt phải
      ctx.beginPath();
      ctx.arc(rightEye.x * canvas.width, rightEye.y * canvas.height - 3, 7, 0, 2 * Math.PI);
      ctx.fillStyle = "#FF6B9D";
      ctx.fill();
      ctx.beginPath();
      ctx.arc(rightEye.x * canvas.width - 2, rightEye.y * canvas.height - 5, 2.5, 0, 2 * Math.PI);
      ctx.fillStyle = "white";
      ctx.fill();
    }
    
    if (nose) {
      ctx.beginPath();
      ctx.ellipse(nose.x * canvas.width, nose.y * canvas.height + 3, 6, 4, 0, 0, 2 * Math.PI);
      ctx.fillStyle = "#FF9EB5";
      ctx.fill();
    }
    
    faceBox.innerText = "🐰 Khuôn mặt: Tai thỏ + Mắt hồng";
  } else {
    faceBox.innerText = "🐰 Khuôn mặt: Đang tìm...";
  }
  
  // 2. HIỆU ỨNG TRÁI TIM TO DẦN TOÀN MÀN HÌNH - ĐẬM MÀU
  if (heartEffect.active) {
    // Tăng kích thước nhanh dần
    heartEffect.scale += 0.045;
    // Giảm độ mờ từ từ
    heartEffect.opacity -= 0.018;
    
    // Giới hạn scale tối đa (phủ kín màn hình)
    const maxScale = 14;
    const currentScale = Math.min(heartEffect.scale, maxScale);
    
    ctx.save();
    ctx.translate(heartEffect.x, heartEffect.y);
    ctx.scale(currentScale, currentScale);
    
    // Lớp tim đậm nhất (màu đỏ rực)
    ctx.globalAlpha = Math.min(heartEffect.opacity, 0.95);
    ctx.font = "140px 'Segoe UI Emoji'";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowBlur = 30;
    ctx.shadowColor = "#ff0000";
    ctx.fillStyle = "#FF0000";
    ctx.fillText("❤️", 0, 0);
    
    // Lớp tim thứ hai (hồng đậm, tạo độ sâu)
    ctx.font = "120px 'Segoe UI Emoji'";
    ctx.fillStyle = `rgba(255, 50, 100, ${Math.min(heartEffect.opacity + 0.2, 0.9)})`;
    ctx.fillText("❤️", 0, 0);
    
    // Lớp tim thứ ba (viền sáng)
    ctx.font = "150px 'Segoe UI Emoji'";
    ctx.fillStyle = `rgba(255, 100, 150, ${Math.min(heartEffect.opacity * 0.6, 0.6)})`;
    ctx.fillText("❤️", 0, 0);
    
    ctx.restore();
    
    // Khi tim đã to hết cỡ HOẶC mờ hết => kết thúc hiệu ứng
    if (heartEffect.scale >= maxScale || heartEffect.opacity <= 0.05) {
      heartEffect.active = false;
      heartEffect.scale = 0;
      heartEffect.opacity = 1;
    }
  }
  
  // 3. Hiệu ứng tim nhỏ bay xung quanh khi đang làm cử chỉ tim
  if (leftOpen.includes("Cái") && leftOpen.includes("Trỏ") && 
      rightOpen.includes("Cái") && rightOpen.includes("Trỏ") &&
      leftLm && rightLm) {
    const leftTip = leftLm[8];
    const rightTip = rightLm[8];
    if (leftTip && rightTip) {
      const midX = (leftTip.x * canvas.width + rightTip.x * canvas.width) / 2;
      const midY = (leftTip.y * canvas.height + rightTip.y * canvas.height) / 2;
      
      for (let i = 0; i < 8; i++) {
        const angle = Date.now() / 400 + i * Math.PI / 4;
        const radius = 25 + Math.sin(Date.now() / 200) * 8;
        const offsetX = Math.cos(angle) * radius;
        const offsetY = Math.sin(angle * 1.2) * radius;
        ctx.font = `${22 + Math.sin(Date.now() / 150 + i) * 4}px 'Segoe UI Emoji'`;
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = "#FF3366";
        ctx.fillText("❤️", midX + offsetX, midY + offsetY - 25);
      }
    }
  }
  
  requestAnimationFrame(drawRabbitFilterAndEffects);
}

// Bắt đầu vòng lặp vẽ
drawRabbitFilterAndEffects();
</script>
</body>
</html>
